name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  # Edits made directly in Notion (e.g. category fixes via the
  # normalize script, manual title tweaks, or freshly captured
  # explanations not yet picked up by the next L4 batch) only surface
  # when something pushes to main. Without a scheduled run, a quiet
  # day in the publishing pipeline means a quiet day on the live
  # site even if the Notion DB has changed. Six-hour cadence picks up
  # those edits fast enough without burning the free-tier minutes.
  schedule:
    - cron: '17 */6 * * *'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fetch articles from Notion
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          # Unified Articles DB (created 2026-04-27). When unset, fetch-notion
          # falls back to the legacy L3 DB id (see scripts/fetch-notion.mjs).
          UNIFIED_DB_ID: ${{ secrets.UNIFIED_DB_ID }}
          # Bridge mode (Phase B in the rollout plan): when "true",
          # fetch-notion reads from BOTH the unified DB and the legacy L3 DB
          # and dedupes by slug. Used to prove parity post-migration; flip
          # to "false" (or remove the secret) once verified.
          FETCH_BRIDGE: ${{ secrets.FETCH_BRIDGE }}
        run: npm run fetch-notion

      - name: Design-token lint
        run: npm run lint:tokens

      - name: Generate sitemap + robots
        run: npm run sitemap

      - name: Build
        env:
          VITE_GA_ID: ${{ secrets.GA4_MEASUREMENT_ID }}
          # Capture (the only write-side route) is gated behind a shared
          # password baked into the bundle at build time. When unset the
          # page renders a visible warning and stays open. See the
          # PasswordGate component in src/pages/Capture.tsx.
          VITE_CAPTURE_PASSWORD: ${{ secrets.VITE_CAPTURE_PASSWORD }}
        run: npm run build

      - name: Copy CNAME
        run: cp CNAME dist/CNAME

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true
          cname: kohuehara.xyz
